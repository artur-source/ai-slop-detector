<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Slop Detector</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
            background: #0f0f0f;
            color: #f4f4f4;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .page {
            width: 100%;
            max-width: 680px;
        }

        .card {
            width: 100%;
            padding: 32px;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            background: #171717;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(2rem, 6vw, 3.25rem);
            line-height: 1;
            letter-spacing: 0;
        }

        .subtitle {
            margin: 0 0 28px;
            color: #b8b8b8;
            font-size: 1rem;
            line-height: 1.5;
        }

        .messages {
            margin: 0 0 18px;
            padding: 0;
            list-style: none;
        }

        .messages li {
            margin-bottom: 8px;
            color: #ff6b6b;
            font-size: 0.95rem;
        }

        textarea {
            width: 100%;
            min-height: 220px;
            resize: vertical;
            padding: 16px;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            background: #101010;
            color: #f4f4f4;
            font: inherit;
            line-height: 1.5;
            outline: none;
        }

        textarea:focus {
            border-color: #f4f4f4;
        }

        textarea::placeholder {
            color: #777;
        }

        button {
            width: 100%;
            margin-top: 16px;
            padding: 14px 18px;
            border: 0;
            border-radius: 10px;
            background: #f4f4f4;
            color: #0f0f0f;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
        }

        button:hover {
            background: #ffffff;
        }

        footer {
            margin-top: 18px;
            text-align: center;
            color: #777;
            font-size: 0.9rem;
        }

        footer a {
            color: #9c9c9c;
            text-decoration: none;
        }

        footer a:hover {
            color: #f4f4f4;
        }

        @media (max-width: 520px) {
            body {
                align-items: stretch;
                padding: 16px;
            }

            .card {
                max-width: 100%;
                padding: 22px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="card" aria-labelledby="page-title">
            <h1 id="page-title">AI Slop Detector</h1>
            <p class="subtitle">Paste text or enter a URL</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <ul class="messages" role="alert">
                        {% for message in messages %}
                            <li>{{ message }}</li>
                        {% endfor %}
                    </ul>
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('main.analyze') }}" method="post">
                <label for="input_data" hidden>Text or URL</label>
                <textarea
                    id="input_data"
                    name="input_data"
                    rows="8"
                    placeholder="Paste an article, essay, or paragraph here. You can also enter a URL like https://example.com/article."
                    required
                ></textarea>
                <button type="submit">Analyze</button>
            </form>
        </section>

        <footer>
            <a href="#" aria-label="GitHub project link">GitHub project</a>
        </footer>
    </main>
</body>
</html>
